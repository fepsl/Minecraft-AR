<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <title>Minecraft AR</title>
  <script src="https://unpkg.com/three@0.126.0/build/three.js"></script>
  <script src="https://unpkg.com/three@0.126.0/examples/js/loaders/GLTFLoader.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; font-family: sans-serif; overflow: hidden; }

    canvas#ar-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; z-index: 0;
    }
    #start-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1a1a2e; gap: 24px; z-index: 100;
    }
    #start-screen h1 { color:#fff; font-size:28px; font-weight:700; letter-spacing:2px; }
    #start-btn {
      background:#4caf50; color:#fff; border:none;
      padding:16px 40px; font-size:18px; font-weight:700;
      border-radius:8px; cursor:pointer; letter-spacing:1px;
    }
    #start-btn:active { background:#388e3c; }

    #ui-overlay {
      position: fixed; inset: 0;
      z-index: 999; pointer-events: none;
    }

    /* Seletor com scroll horizontal para muitos blocos */
    #block-selector {
      display: none;
      position: absolute; bottom: 32px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      border-radius: 12px; padding: 10px 14px;
      flex-direction: row; gap: 10px; align-items: center;
      pointer-events: auto; touch-action: pan-x;
      border: 2px solid transparent;
      transition: border-color 0.2s;
      max-width: calc(100vw - 32px);
      overflow-x: auto;
    }
    #block-selector.destroy-mode { border-color: #e53935; }

    .block-btn {
      width:56px; height:56px; border-radius:8px;
      border:3px solid transparent; cursor:pointer;
      background:none; padding:0; flex-shrink:0;
      -webkit-tap-highlight-color: transparent;
    }
    .block-btn canvas { width:50px; height:50px; border-radius:4px; display:block; pointer-events:none; }
    .block-btn.selected { border-color:#fff; box-shadow:0 0 0 1px rgba(255,255,255,0.4); }

    #selected-label {
      display: none;
      position: absolute; bottom: 110px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color:#fff;
      font-size:13px; font-weight:600;
      padding:4px 12px; border-radius:20px;
      pointer-events:none; white-space:nowrap;
    }
    #crosshair {
      display: none;
      position: absolute; top:50%; left:50%;
      transform: translate(-50%,-50%);
      color: rgba(255,255,255,0.8);
      font-size:28px; font-weight:300;
      pointer-events:none;
      text-shadow:0 0 4px rgba(0,0,0,0.8);
    }
    #hint {
      display: none;
      position: absolute; top:24px; left:50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color:#fff;
      font-size:13px; padding:6px 14px; border-radius:20px;
      pointer-events:none; white-space:nowrap;
    }
    #face-hint {
      display: none;
      position: absolute; top:50%; left:50%;
      transform: translate(-50%,-50%) translateY(-36px);
      background: rgba(255,238,0,0.2); color:#ffee00;
      font-size:11px; font-weight:700;
      padding:2px 10px; border-radius:20px;
      pointer-events:none; letter-spacing:0.4px;
    }

    /* Apenas botão de destruir */
    #action-bar {
      position: absolute; top:24px; right:16px;
      pointer-events: auto;
    }
    .action-btn {
      background: rgba(0,0,0,0.65); color:#fff;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius:8px; padding:8px 14px;
      font-size:13px; font-weight:600;
      cursor:pointer; letter-spacing:0.4px;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    .action-btn:active { background: rgba(255,255,255,0.15); }
    #destroy-btn.active { background:rgba(229,57,53,0.75); border-color:#e53935; }
  </style>
</head>
<body>

<div id="start-screen">
  <h1>MINECRAFT AR</h1>
  <button id="start-btn" onclick="activateXR()">Iniciar AR</button>
</div>

<div id="ui-overlay">
  <div id="block-selector"></div>
  <div id="selected-label"></div>
  <div id="crosshair">+</div>
  <div id="hint">Aponte para uma superfície e toque para colocar um bloco</div>
  <div id="face-hint"></div>
  <div id="action-bar">
    <button class="action-btn" id="destroy-btn" onclick="toggleDestroyMode()">🪓 Destruir</button>
  </div>
</div>

<script>
// ─── Helpers de textura ───────────────────────────────────────────────────────

function makeTexture(drawFn, size=64) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.save(); ctx.scale(size/16, size/16); drawFn(ctx); ctx.restore();
  return c;
}
function makeThreeTex(drawFn) {
  const t = new THREE.CanvasTexture(makeTexture(drawFn, 64));
  t.magFilter = t.minFilter = THREE.NearestFilter;
  return t;
}

// ─── Definições de blocos ─────────────────────────────────────────────────────
// Cada bloco pode ter:
//   draw(ctx)            → textura única para todas as faces (preview e material)
//   drawTop/drawSide/drawBottom → texturas por face (ex: Terra)

const BLOCK_DEFS = [

  // ── Terra (face topo = grama, laterais = terra com faixa verde, baixo = terra)
  {
    id:'terra', label:'Terra',
    // Preview mostra a face lateral (como no Minecraft)
    draw(c) {
      // lateral
      c.fillStyle='#8B5E3C'; c.fillRect(0,0,16,16);
      c.fillStyle='#6b4423';
      [[2,4],[5,7],[10,5],[13,9],[7,11],[3,9],[8,13],[11,12]].forEach(([x,y])=>c.fillRect(x,y,2,2));
      // faixa de grama no topo
      c.fillStyle='#5d8a3c'; c.fillRect(0,0,16,4);
      c.fillStyle='#3d6b22'; c.fillRect(0,3,16,1);
    },
    drawTop(c) {
      // Grama — verde com detalhes
      c.fillStyle='#5d8a3c'; c.fillRect(0,0,16,16);
      c.fillStyle='#4a7a2e';
      [[1,1],[4,3],[8,1],[12,4],[2,8],[6,6],[10,8],[14,6],[3,12],[7,10],[11,13]].forEach(([x,y])=>c.fillRect(x,y,2,2));
      c.fillStyle='#6aaa3c';
      [[2,5],[5,9],[9,3],[13,10],[0,13],[7,14]].forEach(([x,y])=>c.fillRect(x,y,1,1));
    },
    drawSide(c) {
      // Mesmo que draw (lateral com faixa verde)
      c.fillStyle='#8B5E3C'; c.fillRect(0,0,16,16);
      c.fillStyle='#6b4423';
      [[2,4],[5,7],[10,5],[13,9],[7,11],[3,9],[8,13],[11,12]].forEach(([x,y])=>c.fillRect(x,y,2,2));
      c.fillStyle='#5d8a3c'; c.fillRect(0,0,16,4);
      c.fillStyle='#3d6b22'; c.fillRect(0,3,16,1);
    },
    drawBottom(c) {
      // Terra pura
      c.fillStyle='#8B5E3C'; c.fillRect(0,0,16,16);
      c.fillStyle='#6b4423';
      [[1,2],[4,5],[9,3],[13,7],[2,10],[6,8],[10,11],[14,13],[3,14],[8,1]].forEach(([x,y])=>c.fillRect(x,y,2,2));
    }
  },

  // ── Pedra
  {
    id:'pedra', label:'Pedra',
    draw(c){
      c.fillStyle='#888'; c.fillRect(0,0,16,16);
      c.fillStyle='#666';
      [[1,1,5,1],[1,1,1,5],[6,1,10,1],[11,3,15,3],[3,7,3,11],
       [8,6,12,6],[8,6,8,10],[13,8,15,12],[1,12,5,14],[6,11,10,15]]
        .forEach(([x1,y1,x2,y2])=>c.fillRect(Math.min(x1,x2),Math.min(y1,y2),Math.abs(x2-x1)||1,Math.abs(y2-y1)||1));

  {
    id:'areia', label:'Areia',
    draw(c){

      c.fillStyle='#d4c07a';
      [[1,2,2,1],[4,5,1,2],[8,1,2,2],[12,6,1,2],[2,10,2,1],

        .forEach(([x,y,w,h])=>c.fillRect(x,y,w,h));
      c.fillStyle='#f5e8b2';
      [[5,2,1,1],[11,4,1,1],[2,7,1,1],[9,11,1,1]].forEach(([x,y,w,h])=>c.fillRect(x,y,w,h));

  },

  {
    id:'tijolo', label:'Tijolo',
    draw(c){
      c.fillStyle='#9e3b20'; c.fillRect(0,0,16,16);

      [4,12].forEach(y=>c.fillRect(0,y,16,2));
      [0,8].forEach(x=>c.fillRect(x,0,2,4));
      [4,12].forEach(x=>c.fillRect(x,6,2,6));
      [0,8].forEach(x=>c.fillRect(x,14,2,2));
      c.fillStyle='#b04828';

  {
    id:'madeira', label:'Madeira',
    draw(c){

      c.fillStyle='#6b4423'; [2,6,11,14].forEach(x=>c.fillRect(x,0,1,16));
      c.fillStyle='#8b6040';
      [3,7,12].forEach(y=>{ for(let x=0;x<16;x+=3) c.fillRect(x,y,2,1); });
      c.fillStyle='#5a3a1a'; c.fillRect(6,6,4,4);
      c.fillStyle='#6b4a2a'; c.fillRect(7,7,2,2);
    }
  },

  // ── Folhas
  {
    id:'folhas', label:'Folhas',
    draw(c){
      c.fillStyle='#3a6b1a'; c.fillRect(0,0,16,16);
      c.fillStyle='#2d5412';
      [[0,0,3,3],[6,0,4,2],[13,0,3,3],[0,5,2,4],[14,4,2,5],
       [1,12,3,4],[5,14,4,2],[11,13,3,3],[0,9,1,2],[15,10,1,2]]
        .forEach(([x,y,w,h])=>c.fillRect(x,y,w,h));
      c.fillStyle='#4e8f25';
      [[3,1,2,2],[9,2,2,1],[4,6,1,2],[10,5,2,2],[2,10,2,2],[8,9,1,2],[13,11,2,2],[6,13,2,1]]
        .forEach(([x,y,w,h])=>c.fillRect(x,y,w,h));
      // transparência simulada com buracos escuros
      c.fillStyle='#1a3a0a';
      [[5,3,1,1],[11,1,1,1],[2,7,1,1],[13,7,1,1],[6,11,1,1],[10,12,1,1]]
        .forEach(([x,y,w,h])=>c.fillRect(x,y,w,h));
    }
  },

  // ── Vidro (transparente)
  {
    id:'vidro', label:'Vidro',
    transparent: true,
    draw(c){
      // fundo totalmente transparente
      c.clearRect(0,0,16,16);
      // tinta azulada semitransparente no interior
      c.fillStyle='rgba(180,230,245,0.18)'; c.fillRect(1,1,14,14);
      // borda opaca
      c.fillStyle='rgba(140,200,220,0.85)';
      c.fillRect(0,0,16,1); c.fillRect(0,15,16,1);
      c.fillRect(0,0,1,16); c.fillRect(15,0,1,16);
      // divisórias internas finas
      c.fillStyle='rgba(160,215,230,0.5)';
      c.fillRect(7,1,1,14); c.fillRect(1,7,14,1);
      // reflexo
      c.fillStyle='rgba(240,252,255,0.6)';
      [[2,2,4,1],[2,3,1,3],[8,1,3,1]].forEach(([x,y,w,h])=>c.fillRect(x,y,w,h));
    }
  },

  // ── Neve
  {
    id:'neve', label:'Neve',
    draw(c){
      c.fillStyle='#f0f4f8'; c.fillRect(0,0,16,16);
      c.fillStyle='#dce4ec';
      [[1,2,3,1],[5,1,2,2],[10,3,3,1],[13,1,2,2],
       [0,6,2,2],[4,7,3,1],[8,5,2,2],[13,6,3,2],
       [1,10,2,2],[5,12,3,1],[9,10,2,2],[13,11,2,1],
       [2,14,3,1],[7,13,2,2],[12,14,3,1]]
        .forEach(([x,y,w,h])=>c.fillRect(x,y,w,h));
      c.fillStyle='#ffffff';
      [[3,4,1,1],[7,3,1,1],[11,5,1,1],[2,8,1,1],[6,9,1,1],[10,8,1,1],[14,9,1,1],[4,13,1,1],[8,12,1,1],[12,13,1,1]]
        .forEach(([x,y,w,h])=>c.fillRect(x,y,w,h));
    }
  },

  // ── Minério de diamante
  {
    id:'diamante', label:'Diamante',
    draw(c){
      // base pedra
      c.fillStyle='#888'; c.fillRect(0,0,16,16);
      c.fillStyle='#666';
      [[1,1,4,1],[1,1,1,4],[11,1,4,1],[14,1,1,4],
       [1,11,1,4],[1,14,4,1],[11,14,4,1],[14,11,1,4]]
        .forEach(([x,y,w,h])=>c.fillRect(x,y,w,h));
      // veios de diamante ciano
      c.fillStyle='#4de8e8';
      [[5,3,2,2],[9,2,2,3],[3,6,2,2],[11,7,2,2],[5,10,3,2],[9,11,2,2],[3,12,2,2],[11,12,2,2]]
        .forEach(([x,y,w,h])=>c.fillRect(x,y,w,h));
      // brilho
      c.fillStyle='#afffff';
      [[5,3,1,1],[9,2,1,1],[3,6,1,1],[11,7,1,1],[5,10,1,1]]
        .forEach(([x,y,w,h])=>c.fillRect(x,y,w,h));
    }
  },

  // ── Ouro
  {
    id:'ouro', label:'Ouro',
    draw(c){
      c.fillStyle='#888'; c.fillRect(0,0,16,16);
      c.fillStyle='#666';
      [[0,0,16,1],[0,15,16,1],[0,0,1,16],[15,0,1,16],
       [3,3,2,1],[3,3,1,2],[11,3,2,1],[13,3,1,2],
       [3,12,1,2],[3,13,2,1],[11,12,1,2],[13,13,2,1]]
        .forEach(([x,y,w,h])=>c.fillRect(x,y,w,h));
      // veios dourados
      c.fillStyle='#f0c020';
      [[4,4,3,2],[9,3,2,3],[3,8,2,2],[11,8,2,2],[5,11,3,2],[9,12,2,2]]
        .forEach(([x,y,w,h])=>c.fillRect(x,y,w,h));
      c.fillStyle='#ffe060';
      [[4,4,1,1],[9,3,1,1],[3,8,1,1],[11,8,1,1],[5,11,1,1]]
        .forEach(([x,y,w,h])=>c.fillRect(x,y,w,h));
    }
  },

];

// ─── Helpers para material multi-face (terra) ─────────────────────────────────
// BoxGeometry: face order = +X, -X, +Y, -Y, +Z, -Z
// Para Three.js: materialIndex 0=+x, 1=-x, 2=+y(topo), 3=-y(baixo), 4=+z, 5=-z

function makeFacedMaterial(def) {
  const isTransp = !!def.transparent;

  function matFrom(drawFn) {
    const c = document.createElement('canvas');
    c.width = c.height = 64;
    const ctx = c.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.save(); ctx.scale(4, 4); drawFn(ctx); ctx.restore();
    const tex = new THREE.CanvasTexture(c);
    tex.magFilter = tex.minFilter = THREE.NearestFilter;
    return new THREE.MeshStandardMaterial({
      map: tex,
      transparent: isTransp,
      alphaTest: isTransp ? 0.01 : 0,
      depthWrite: !isTransp,
      side: isTransp ? THREE.DoubleSide : THREE.FrontSide,
    });
  }

  if (!def.drawTop) return matFrom(def.draw);
  const top = matFrom(def.drawTop), side = matFrom(def.drawSide), bot = matFrom(def.drawBottom);
  return [ side, side, top, bot, side, side ];
}

// ─── Seletor ──────────────────────────────────────────────────────────────────

let selectedBlock = BLOCK_DEFS[0];
let destroyMode   = false;

function showLabel(txt) {
  const l = document.getElementById('selected-label');
  l.textContent = txt;
  l.style.display = 'block';
  clearTimeout(l._t);
  l._t = setTimeout(() => { l.style.display='none'; }, 1500);
}

function toggleDestroyMode() {
  destroyMode = !destroyMode;
  document.getElementById('destroy-btn').classList.toggle('active', destroyMode);
  document.getElementById('block-selector').classList.toggle('destroy-mode', destroyMode);
  showLabel(destroyMode ? '🪓 Modo destruição' : selectedBlock.label);
}

function buildSelector() {
  const sel = document.getElementById('block-selector');
  BLOCK_DEFS.forEach(def => {
    const btn = document.createElement('button');
    btn.className = 'block-btn' + (def.id===selectedBlock.id ? ' selected' : '');
    btn.appendChild(makeTexture(def.draw, 50));
    const pick = () => {
      if (destroyMode) toggleDestroyMode();
      selectedBlock = def;
      sel.querySelectorAll('.block-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      showLabel(def.label);
    };
    btn.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); }, { passive:false });
    btn.addEventListener('touchend',   e => { e.preventDefault(); e.stopPropagation(); pick(); }, { passive:false });
    btn.addEventListener('click',      e => { e.stopPropagation(); pick(); });
    sel.appendChild(btn);
  });
  sel.style.display = 'flex';
}

// ─── Estado do mundo ──────────────────────────────────────────────────────────

const blockMap = new Map();
let   sceneRef = null;

function gkey(x,y,z) {
  return `${Math.round(x*10)},${Math.round(y*10)},${Math.round(z*10)}`;
}

// ─── Faces ────────────────────────────────────────────────────────────────────

const NORMALS = [
  new THREE.Vector3( 1,0,0), new THREE.Vector3(-1,0,0),
  new THREE.Vector3( 0,1,0), new THREE.Vector3( 0,-1,0),
  new THREE.Vector3( 0,0,1), new THREE.Vector3( 0,0,-1),
];
const FACE_NAMES = ['Direita','Esquerda','Cima','Baixo','Frente','Trás'];

// ─── WebXR ────────────────────────────────────────────────────────────────────

async function activateXR() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('crosshair').style.display = 'block';
  document.getElementById('hint').style.display = 'block';
  buildSelector();

  const canvas = document.createElement('canvas');
  canvas.id = 'ar-canvas';
  document.body.insertBefore(canvas, document.getElementById('ui-overlay'));
  const gl = canvas.getContext('webgl', { xrCompatible:true });

  const scene = new THREE.Scene();
  sceneRef = scene;

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const sun = new THREE.DirectionalLight(0xffffff, 0.8);
  sun.position.set(10,15,10); scene.add(sun);

  const renderer = new THREE.WebGLRenderer({ alpha:true, preserveDrawingBuffer:true, canvas, context:gl });
  renderer.autoClear = false;

  const camera = new THREE.PerspectiveCamera();
  camera.matrixAutoUpdate = false;

  const raycaster = new THREE.Raycaster();

  const session = await navigator.xr.requestSession('immersive-ar', {
    requiredFeatures: ['hit-test'],
    optionalFeatures: ['dom-overlay'],
    domOverlay: { root: document.getElementById('ui-overlay') }
  });
  session.updateRenderState({ baseLayer: new XRWebGLLayer(session, gl) });

  const refSpace    = await session.requestReferenceSpace('local');
  const viewerSpace = await session.requestReferenceSpace('viewer');
  const hitSrc      = await session.requestHitTestSource({ space: viewerSpace });

  let reticle;
  new THREE.GLTFLoader().load(
    'https://immersive-web.github.io/webxr-samples/media/gltf/reticle/reticle.gltf',
    g => { reticle = g.scene; reticle.visible=false; scene.add(reticle); }
  );

  const hlMat  = new THREE.MeshBasicMaterial({ color:0xffee00, wireframe:true, transparent:true, opacity:0.7 });
  const hlMesh = new THREE.Mesh(new THREE.BoxGeometry(0.102,0.102,0.102), hlMat);
  hlMesh.visible = false;
  scene.add(hlMesh);

  // Pré-compila materiais de todos os blocos
  const mats = {};
  BLOCK_DEFS.forEach(d => { mats[d.id] = makeFacedMaterial(d); });
  const geo = new THREE.BoxGeometry(0.1,0.1,0.1);

  function snap(v) { return Math.round(v/0.1)*0.1; }

  function placeBlock(px,py,pz) {
    const x=snap(px), y=snap(py), z=snap(pz);
    const k = gkey(x,y,z);
    if (blockMap.has(k)) return;
    const m = new THREE.Mesh(geo, mats[selectedBlock.id]);
    m.position.set(x,y,z);
    scene.add(m);
    blockMap.set(k,m);
    document.getElementById('hint').style.display='none';
    m.scale.setScalar(0.01);
    const t0=performance.now();
    (function grow(){
      const t=Math.min((performance.now()-t0)/150,1);
      m.scale.setScalar(t<0.5?2*t*t:-1+(4-2*t)*t);
      if(t<1) requestAnimationFrame(grow);
    })();
  }

  function destroyBlock(m) {
    blockMap.delete(gkey(m.position.x,m.position.y,m.position.z));
    scene.remove(m);
  }

  let nextPos   = null;
  let aimedMesh = null;
  let hitFloor  = false;

  session.addEventListener('select', () => {
    if (destroyMode) {
      if (aimedMesh) destroyBlock(aimedMesh);
    } else if (nextPos) {
      placeBlock(nextPos.x, nextPos.y, nextPos.z);
    } else if (hitFloor && reticle && reticle.visible) {
      placeBlock(reticle.position.x, reticle.position.y, reticle.position.z);
    }
  });

  const faceHintEl = document.getElementById('face-hint');

  const onXRFrame = (time, frame) => {
    session.requestAnimationFrame(onXRFrame);
    gl.bindFramebuffer(gl.FRAMEBUFFER, session.renderState.baseLayer.framebuffer);

    const pose = frame.getViewerPose(refSpace);
    if (!pose) return;

    const view = pose.views[0];
    const vp   = session.renderState.baseLayer.getViewport(view);
    renderer.setSize(vp.width, vp.height);
    camera.matrix.fromArray(view.transform.matrix);
    camera.projectionMatrix.fromArray(view.projectionMatrix);
    camera.updateMatrixWorld(true);

    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = raycaster.intersectObjects([...blockMap.values()]);

    nextPos   = null;
    aimedMesh = null;
    hlMesh.visible = false;
    faceHintEl.style.display = 'none';

    if (hits.length > 0) {
      const h = hits[0];
      aimedMesh = h.object;

      if (destroyMode) {
        hlMat.color.set(0xff2222);
        hlMesh.position.copy(aimedMesh.position);
        hlMesh.visible = true;
      } else {
        let bestIdx=0, bestDot=-2;
        NORMALS.forEach((n,i)=>{ const d=h.face.normal.dot(n); if(d>bestDot){bestDot=d;bestIdx=i;} });
        const n = NORMALS[bestIdx];
        const adj = new THREE.Vector3(
          snap(aimedMesh.position.x + n.x*0.1),
          snap(aimedMesh.position.y + n.y*0.1),
          snap(aimedMesh.position.z + n.z*0.1)
        );
        if (!blockMap.has(gkey(adj.x,adj.y,adj.z))) {
          nextPos = adj;
          hlMat.color.set(0xffee00);
          hlMesh.position.copy(adj);
          hlMesh.visible = true;
          faceHintEl.textContent = FACE_NAMES[bestIdx];
          faceHintEl.style.display = 'block';
        }
      }
    }

    const htResults = frame.getHitTestResults(hitSrc);
    hitFloor = false;
    if (htResults.length > 0 && reticle && !aimedMesh) {
      const hp = htResults[0].getPose(refSpace);
      reticle.position.set(hp.transform.position.x, hp.transform.position.y, hp.transform.position.z);
      reticle.updateMatrixWorld(true);
      reticle.visible = true;
      hitFloor = true;
    } else if (reticle) {
      reticle.visible = false;
    }

    renderer.render(scene, camera);
  };

  session.requestAnimationFrame(onXRFrame);
}
</script>
